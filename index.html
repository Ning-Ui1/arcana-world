<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCANA V3 | Divine Convergence</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+SC:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --obsidian: #020202;
            --blood: #4a0404;
        }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--obsidian);
            color: white;
            font-family: 'Cinzel', 'Noto Serif SC', serif;
            overflow: hidden;
            cursor: none;
        }
        #ritual-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }
        
        /* Alchemical Pointer */
        #cursor {
            position: fixed;
            width: 30px; height: 30px;
            border: 0.5px solid var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, border-color 0.3s;
        }
        #cursor-dot {
            position: fixed;
            width: 4px; height: 4px;
            background: var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
        }

        /* Narrative Layers */
        .narrative {
            position: fixed;
            z-index: 100;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }
        .slide-up {
            bottom: 15%;
            font-size: 1.5rem;
            letter-spacing: 0.8rem;
            color: var(--gold);
            opacity: 0;
            transform: translateY(50px);
        }
        .side-title {
            left: 3%; top: 50%;
            position: fixed;
            writing-mode: vertical-rl;
            font-size: 0.7rem;
            letter-spacing: 1.5rem;
            color: rgba(197, 160, 89, 0.4);
            transform: translateY(-50%);
        }

        /* Interaction UI */
        .ritual-ui {
            position: absolute;
            z-index: 50;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 5vh;
            pointer-events: none;
        }
        
        .mode-selector {
            pointer-events: auto;
            display: flex;
            gap: 20px;
            margin-bottom: 20px;
            opacity: 0;
        }
        .mode-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 0.5px solid var(--gold);
            color: var(--gold);
            padding: 10px 25px;
            font-size: 0.6rem;
            letter-spacing: 0.3rem;
            cursor: pointer;
            transition: all 0.3s;
        }
        .mode-btn.active {
            background: var(--gold);
            color: var(--obsidian);
        }

        .status-msg {
            font-size: 0.7rem;
            letter-spacing: 0.5rem;
            color: var(--gold);
            text-transform: uppercase;
        }

        /* Elements Symbols */
        .element-symbol {
            position: fixed;
            bottom: 30px;
            right: 30px;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            z-index: 100;
            opacity: 0.3;
        }
        .elem { font-size: 12px; color: var(--gold); }

        /* Loader */
        .loader-v3 {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .yin-yang-loader {
            width: 80px; height: 80px;
            background: linear-gradient(to right, white 50%, black 50%);
            border-radius: 50%;
            animation: spin 5s linear infinite;
            position: relative;
        }
        .yin-yang-loader::before, .yin-yang-loader::after {
            content: '';
            position: absolute;
            width: 40px; height: 40px;
            border-radius: 50%;
            left: 50%;
            transform: translateX(-50%);
        }
        .yin-yang-loader::before { top: 0; background: white; }
        .yin-yang-loader::after { bottom: 0; background: black; }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div id="cursor-dot"></div>

    <div class="loader-v3" id="loader">
        <div class="yin-yang-loader"></div>
        <div style="margin-top: 40px; letter-spacing: 1.2rem; color: var(--gold);">万象归一</div>
    </div>

    <canvas id="ritual-canvas"></canvas>

    <div class="side-title">ARCANA | DIVINE CONVERGENCE</div>

    <div class="narrative">
        <div id="subtitle" class="slide-up">乾坤既定，五行流转</div>
    </div>

    <div class="ritual-ui">
        <div class="mode-selector" id="mode-selector">
            <button class="mode-btn active" data-mode="tear">Tear / 撕</button>
            <button class="mode-btn" data-mode="cut">Cut / 剪</button>
            <button class="mode-btn" data-mode="open">Open / 启</button>
        </div>
        <div class="status-msg" id="status">Hold to interact / 长按感应</div>
    </div>

    <div class="element-symbol">
        <div class="elem">金</div>
        <div class="elem">木</div>
        <div class="elem">水</div>
        <div class="elem">火</div>
        <div class="elem">土</div>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js"></script>

    <script>
        // --- ARCANA V3: DIVINE CONVERGENCE ENGINE ---
        (function() {
            const canvas = document.getElementById('ritual-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // Immersive Lighting
            const ambient = new THREE.AmbientLight(0xffffff, 0.1);
            scene.add(ambient);

            const pointerLight = new THREE.PointLight(0xc5a059, 4, 15);
            scene.add(pointerLight);

            // 1. The Altar of Elements
            const altarGeo = new THREE.TorusGeometry(6, 0.05, 16, 100);
            const altarMat = new THREE.MeshStandardMaterial({ color: 0xc5a059, emissive: 0xc5a059, emissiveIntensity: 0.5 });
            const altarRing = new THREE.Mesh(altarGeo, altarMat);
            altarRing.rotation.x = Math.PI / 2;
            altarRing.position.y = -2;
            scene.add(altarRing);

            // 2. The Interaction Target (The Bag / Box)
            const targetGroup = new THREE.Group();
            scene.add(targetGroup);

            // The Silk Bag (Mesh for Tearing)
            const bagGeo = new THREE.PlaneGeometry(3, 4, 64, 64);
            const bagMat = new THREE.MeshStandardMaterial({ 
                color: 0x050505, 
                side: THREE.DoubleSide,
                emissive: 0x2d1b4e,
                emissiveIntensity: 0.3,
                transparent: true
            });
            const bag = new THREE.Mesh(bagGeo, bagMat);
            targetGroup.add(bag);

            // The Lacquer Box (For Opening)
            const boxGeo = new THREE.BoxGeometry(3.2, 1, 4.5);
            const boxMat = new THREE.MeshStandardMaterial({ color: 0x0a0a0a, roughness: 0.1, metalness: 0.9 });
            const boxBase = new THREE.Mesh(boxGeo, boxMat);
            boxBase.position.y = -1.5;
            boxBase.visible = false;
            scene.add(boxBase);

            const lidGeo = new THREE.BoxGeometry(3.2, 0.2, 4.5);
            const lid = new THREE.Mesh(lidGeo, boxMat);
            lid.position.set(0, -1, 0);
            lid.visible = false;
            scene.add(lid);

            // 3. Elements Particles
            const pCount = 2000;
            const pGeo = new THREE.BufferGeometry();
            const pPos = new Float32Array(pCount * 3);
            const pColors = new Float32Array(pCount * 3);
            for(let i=0; i<pCount; i++) {
                pPos[i*3] = (Math.random()-0.5)*20;
                pPos[i*3+1] = (Math.random()-0.5)*20;
                pPos[i*3+2] = (Math.random()-0.5)*20;
            }
            pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
            const pMat = new THREE.PointsMaterial({ size: 0.02, vertexColors: true, transparent: true, opacity: 0.4 });
            const particles = new THREE.Points(pGeo, pMat);
            scene.add(particles);

            // 4. Interaction Logic
            let mouse = new THREE.Vector2();
            let isDown = false;
            let currentMode = 'tear';
            let interactionProgress = 0;

            const cursor = document.getElementById('cursor');
            const cursorDot = document.getElementById('cursor-dot');

            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
                cursorDot.style.left = e.clientX + 'px';
                cursorDot.style.top = e.clientY + 'px';

                gsap.to(pointerLight.position, { x: mouse.x * 5, y: mouse.y * 5, z: 4, duration: 0.6 });
            });

            window.addEventListener('mousedown', () => {
                isDown = true;
                gsap.to(cursor, { scale: 1.5, borderColor: '#ff0000', duration: 0.3 });
            });
            window.addEventListener('mouseup', () => {
                isDown = false;
                gsap.to(cursor, { scale: 1, borderColor: '#c5a059', duration: 0.3 });
            });

            // Mode Switching
            document.querySelectorAll('.mode-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelector('.mode-btn.active').classList.remove('active');
                    btn.classList.add('active');
                    currentMode = btn.dataset.mode;
                    resetRitual();
                });
            });

            function resetRitual() {
                interactionProgress = 0;
                bag.visible = (currentMode === 'tear' || currentMode === 'cut');
                boxBase.visible = (currentMode === 'open');
                lid.visible = (currentMode === 'open');
                // Reset geometries
            }

            // 5. Physics & Ritual Rendering
            function animate(t) {
                requestAnimationFrame(animate);
                const time = t * 0.001;

                // 3D Tilt & Panoramic View
                camera.position.x += (mouse.x * 3 - camera.position.x) * 0.05;
                camera.position.y += (mouse.y * 3 - camera.position.y) * 0.05;
                camera.lookAt(0, 0, 0);

                // Mode-Specific Ritual Logic
                if(isDown) {
                    if(currentMode === 'tear') {
                        const pos = bag.geometry.attributes.position;
                        for(let i=0; i<pos.count; i++) {
                            const x = pos.getX(i);
                            if(Math.abs(x) < 0.2) {
                                pos.setX(i, x + (x > 0 ? 0.08 : -0.08));
                            }
                        }
                        pos.needsUpdate = true;
                        interactionProgress += 0.01;
                    } else if(currentMode === 'open') {
                        lid.position.y += 0.05;
                        lid.rotation.x += 0.02;
                        interactionProgress += 0.02;
                    }
                    
                    if(interactionProgress >= 1.5) triggerReveal();
                }

                // Elements Flow (Particles)
                particles.rotation.y += 0.001;
                altarRing.rotation.z += 0.01;

                renderer.render(scene, camera);
            }

            function triggerReveal() {
                isDown = false;
                gsap.to('#subtitle', { opacity: 1, y: 0, duration: 2 });
                // Reveal Card with Bagua/Five Elements Logic
            }

            // Initial Reveal
            window.onload = () => {
                setTimeout(() => {
                    gsap.to('#loader', { opacity: 0, duration: 2, onComplete: () => {
                        document.getElementById('loader').style.display = 'none';
                        gsap.to('#mode-selector', { opacity: 1, duration: 1 });
                        animate(0);
                    }});
