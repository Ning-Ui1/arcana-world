<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCANA V2 | The Sacred Ritual</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --obsidian: #020202;
        }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--obsidian);
            color: white;
            font-family: 'Cinzel', serif;
            overflow: hidden;
        }
        #canvas-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }
        .overlay {
            position: relative;
            z-index: 10;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            background: radial-gradient(circle at center, transparent 0%, rgba(2,2,2,0.4) 100%);
        }
        h1 {
            font-size: 4rem;
            letter-spacing: 1.2rem;
            color: var(--gold);
            margin: 0;
            text-shadow: 0 0 40px rgba(197, 160, 89, 0.4);
            opacity: 0;
        }
        .controls {
            margin-top: 100px;
            pointer-events: auto;
            opacity: 0;
        }
        .btn {
            background: transparent;
            border: 0.5px solid rgba(197, 160, 89, 0.4);
            color: var(--gold);
            padding: 18px 50px;
            font-family: inherit;
            text-transform: uppercase;
            letter-spacing: 0.4rem;
            font-size: 0.7rem;
            cursor: pointer;
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
            overflow: hidden;
            margin: 0 15px;
        }
        .btn::before {
            content: '';
            position: absolute;
            top: 50%; left: 50%;
            width: 120%; height: 120%;
            background: var(--gold);
            transform: translate(-50%, -50%) scale(0);
            transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: -1;
            opacity: 0.1;
        }
        .btn:hover::before { transform: translate(-50%, -50%) scale(1); }
        .btn:hover {
            border-color: var(--gold);
            letter-spacing: 0.5rem;
            box-shadow: 0 0 30px rgba(197, 160, 89, 0.2);
        }
        
        /* Ritual Loader */
        .loader {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }
        .ritual-circle {
            width: 100px; height: 100px;
            border: 1px solid var(--gold);
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 3s cubic-bezier(0.68, -0.55, 0.27, 1.55) infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .vignette {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            box-shadow: inset 0 0 200px rgba(0,0,0,0.9);
            pointer-events: none;
            z-index: 5;
        }
    </style>
</head>
<body>
    <div class="loader" id="loader">
        <div class="ritual-circle"></div>
    </div>
    <div class="vignette"></div>
    <div id="canvas-container"></div>
    <div class="overlay">
        <h1 id="title">ARCANA</h1>
        <div class="controls" id="controls">
            <button class="btn" id="flip-btn">Invoke Fate</button>
            <button class="btn" id="dissipate-btn">Ascend</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    
    <!-- Shaders -->
    <script id="aurora-vs" type="x-shader/x-vertex">
        varying vec2 vUv;
        void main() {
            vUv = uv;
            gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
    </script>
    <script id="aurora-fs" type="x-shader/x-fragment">
        uniform float time;
        uniform vec2 resolution;
        varying vec2 vUv;

        void main() {
            vec2 p = vUv * 2.0 - 1.0;
            p.x *= resolution.x / resolution.y;
            
            float color = 0.0;
            for(float i=1.0; i<4.0; i++) {
                p.x += 0.3 / i * sin(i * 3.0 * p.y + time + i * 0.5);
                p.y += 0.3 / i * cos(i * 3.0 * p.x + time + i * 0.5);
                color += abs(0.01 / p.x) * i;
            }
            
            vec3 baseColor = vec3(0.02, 0.01, 0.05); // Obsidian deep purple
            vec3 auroraColor = vec3(0.1, 0.05, 0.2) * color;
            gl_FragColor = vec4(baseColor + auroraColor * 0.3, 1.0);
        }
    </script>

    <script>
        (function() {
            // Scene Setup
            const container = document.getElementById('canvas-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(30, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.toneMapping = THREE.ReinhardToneMapping;
            container.appendChild(renderer.domElement);

            camera.position.z = 10;

            // Lights
            const ambient = new THREE.AmbientLight(0xffffff, 0.1);
            scene.add(ambient);

            const goldLight = new THREE.PointLight(0xc5a059, 2, 20);
            goldLight.position.set(2, 2, 5);
            scene.add(goldLight);

            const purpleLight = new THREE.PointLight(0x2d1b4e, 3, 20);
            purpleLight.position.set(-3, -2, 4);
            scene.add(purpleLight);

            // Background Aurora
            const bgGeometry = new THREE.PlaneGeometry(30, 20);
            const bgMaterial = new THREE.ShaderMaterial({
                uniforms: {
                    time: { value: 0 },
                    resolution: { value: new THREE.Vector2(window.innerWidth, window.innerHeight) }
                },
                vertexShader: document.getElementById('aurora-vs').textContent,
                fragmentShader: document.getElementById('aurora-fs').textContent,
                depthWrite: false
            });
            const background = new THREE.Mesh(bgGeometry, bgMaterial);
            background.position.z = -5;
            scene.add(background);

            // Card - The Masterpiece
            const cardGroup = new THREE.Group();
            scene.add(cardGroup);

            const cardGeo = new THREE.BoxGeometry(2.5, 4.2, 0.08);
            const cardMat = [
                new THREE.MeshStandardMaterial({ color: 0x000000, metalness: 0.9, roughness: 0.1 }), // Sides
                new THREE.MeshStandardMaterial({ color: 0x000000, metalness: 0.9, roughness: 0.1 }),
                new THREE.MeshStandardMaterial({ color: 0x000000, metalness: 0.9, roughness: 0.1 }),
                new THREE.MeshStandardMaterial({ color: 0x000000, metalness: 0.9, roughness: 0.1 }),
                new THREE.MeshStandardMaterial({ 
                    color: 0x050505, 
                    emissive: 0x2d1b4e, 
                    emissiveIntensity: 0.4,
                    metalness: 1, 
                    roughness: 0.2,
                    transparent: true
                }), // Front
                new THREE.MeshStandardMaterial({ 
                    color: 0x020202, 
                    emissive: 0xc5a059, 
                    emissiveIntensity: 0.15,
                    metalness: 1, 
                    roughness: 0.1,
                    transparent: true
                })  // Back
            ];
            const card = new THREE.Mesh(cardGeo, cardMat);
            cardGroup.add(card);

            // Gold Edge Frame (The Alchemical Line)
            const frameGeo = new THREE.BoxGeometry(2.55, 4.25, 0.09);
            const frameMat = new THREE.MeshStandardMaterial({ 
                color: 0xc5a059, 
                metalness: 1, 
                roughness: 0.1, 
                emissive: 0xc5a059, 
                emissiveIntensity: 0.2,
                wireframe: true 
            });
            const frame = new THREE.Mesh(frameGeo, frameMat);
            cardGroup.add(frame);

            // Particle Field (Soul Fragments)
            const pCount = 3000;
            const pGeo = new THREE.BufferGeometry();
            const pPos = new Float32Array(pCount * 3);
            const pVel = new Float32Array(pCount * 3);
            for(let i=0; i<pCount; i++) {
                pPos[i*3] = (Math.random()-0.5)*2.5;
                pPos[i*3+1] = (Math.random()-0.5)*4.2;
                pPos[i*3+2] = (Math.random()-0.5)*0.1;
                pVel[i*3] = (Math.random()-0.5)*0.01;
                pVel[i*3+1] = (Math.random()-0.5)*0.01;
                pVel[i*3+2] = Math.random()*0.02;
            }
            pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
            const pMat = new THREE.PointsMaterial({
                color: 0xc5a059,
                size: 0.015,
                transparent: true,
                opacity: 0,
                blending: THREE.AdditiveBlending
            });
            const particles = new THREE.Points(pGeo, pMat);
            scene.add(particles);

            // Mouse Inertia Logic
            let mouse = { x: 0, y: 0 };
            let targetRotation = { x: 0, y: 0 };
            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) - 0.5;
                mouse.y = (e.clientY / window.innerHeight) - 0.5;
            });

            // Ritual States
            let isInvoked = false;
            let isAscended = false;

            document.getElementById('flip-btn').addEventListener('click', () => {
                isInvoked = !isInvoked;
                gsap.to(cardGroup.rotation, {
                    y: isInvoked ? Math.PI : 0,
                    duration: 2.2,
                    ease: "expo.inOut"
                });
                gsap.to(goldLight, { intensity: isInvoked ? 4 : 2, duration: 1 });
                document.getElementById('flip-btn').innerText = isInvoked ? "Seal Fate" : "Invoke Fate";
            });

            document.getElementById('dissipate-btn').addEventListener('click', () => {
                if(isAscended) return;
                isAscended = true;
                
                // Hide Card
                gsap.to(cardMat, { opacity: 0, duration: 1.5, stagger: 0.1 });
                gsap.to(frameMat, { opacity: 0, duration: 1 });
                
                // Invoke Particles
                gsap.to(pMat, { opacity: 0.8, duration: 0.5 });
                
                gsap.delayedCall(1.5, () => {
                    gsap.to(pMat, { opacity: 0, duration: 3, ease: "power2.inOut", onComplete: () => {
                        cardMat.forEach(m => m.opacity = 1);
                        frameMat.opacity = 1;
                        isAscended = false;
                        isInvoked = false;
                        cardGroup.rotation.y = 0;
                        document.getElementById('flip-btn').innerText = "Invoke Fate";
                    }});
                });
            });

            // Animation Loop
            function animate(t) {
                requestAnimationFrame(animate);
                const time = t * 0.001;
                
                bgMaterial.uniforms.time.value = time;
                
                // Inertia & Heavy Floating
                if(!isInvoked && !isAscended) {
                    targetRotation.x += (mouse.y * 0.4 - targetRotation.x) * 0.05;
                    targetRotation.y += (mouse.x * 0.4 - targetRotation.y) * 0.05;
                    cardGroup.rotation.x = targetRotation.x + Math.sin(time) * 0.05;
                    cardGroup.rotation.y = targetRotation.y + Math.cos(time * 0.5) * 0.05;
                }
                
                if(isAscended) {
                    const pos = pGeo.attributes.position.array;
                    for(let i=0; i<pCount; i++) {
                        pos[i*3] += pVel[i*3] * (1 + Math.sin(time));
                        pos[i*3+1] += pVel[i*3+1] * (2 + Math.cos(time));
                        pos[i*3+2] += pVel[i*3+2] * 5;
                    }
                    pGeo.attributes.position.needsUpdate = true;
                }

                renderer.render(scene, camera);
            }

            // Reveal Sequence
            window.onload = () => {
                gsap.to('#loader', { opacity: 0, duration: 2, delay: 1.5, onComplete: () => {
                    document.getElementById('loader').style.display = 'none';
                    gsap.to('#title', { opacity: 1, duration: 2, ease: "power4.out" });
                    gsap.to('#controls', { opacity: 1, duration: 2, delay: 0.5 });
                    animate(0);
                }});
            };

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
                bgMaterial.uniforms.resolution.value.set(window.innerWidth, window.innerHeight);
            });
        })();
    </script>
</body>
</html>
