<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARCANA V3 | Divine Convergence</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Noto+Serif+SC:wght@300;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c5a059;
            --obsidian: #020202;
            --ink: #0a0a0a;
        }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background: var(--obsidian);
            color: white;
            font-family: 'Cinzel', 'Noto Serif SC', serif;
            overflow: hidden;
            cursor: none;
        }
        #ritual-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
        }
        
        /* Custom Cursor - The Alchemical Pointer */
        #cursor {
            position: fixed;
            width: 20px; height: 20px;
            border: 1px solid var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            mix-blend-mode: difference;
            transition: width 0.3s, height 0.3s, background 0.3s;
        }
        #cursor-dot {
            position: fixed;
            width: 4px; height: 4px;
            background: var(--gold);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
        }

        /* Narrative Layers */
        .narrative-layer {
            position: fixed;
            z-index: 100;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }
        .text-slide-up {
            bottom: 10%;
            font-size: 1.2rem;
            letter-spacing: 0.5rem;
            color: rgba(197, 160, 89, 0.6);
            transform: translateY(100px);
            opacity: 0;
        }
        .text-side-left {
            left: 5%;
            top: 50%;
            writing-mode: vertical-rl;
            letter-spacing: 1rem;
            font-size: 0.8rem;
            color: var(--gold);
            transform: translateX(-50px);
            opacity: 0;
        }

        /* UI Overlays */
        .ui-ritual {
            position: absolute;
            z-index: 50;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #instruction {
            position: absolute;
            top: 70%;
            font-size: 0.8rem;
            letter-spacing: 0.3rem;
            color: var(--gold);
            text-transform: uppercase;
            animation: breathe 3s infinite ease-in-out;
        }

        @keyframes breathe {
            0%, 100% { opacity: 0.3; transform: scale(0.98); }
            50% { opacity: 0.8; transform: scale(1.02); }
        }

        .loader-v3 {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--obsidian);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .tai-chi-loader {
            width: 60px; height: 60px;
            border: 2px solid var(--gold);
            border-radius: 50%;
            position: relative;
            animation: rotate 4s linear infinite;
        }
        .tai-chi-loader::after {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 50%;
            background: var(--gold);
            border-radius: 50% 50% 0 0;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="cursor"></div>
    <div id="cursor-dot"></div>

    <div class="loader-v3" id="loader">
        <div class="tai-chi-loader"></div>
        <div style="margin-top: 30px; letter-spacing: 0.8rem; color: var(--gold); font-size: 0.6rem;">万象归一 | DIVINE CONVERGENCE</div>
    </div>

    <canvas id="ritual-canvas"></canvas>

    <div class="ui-ritual" id="ui-ritual">
        <div id="instruction">Tear the Bag to Reveal Your Destiny / 撕开锦囊</div>
    </div>

    <div class="narrative-layer">
        <div id="subtitle" class="text-slide-up">乾坤既定，万象更新</div>
        <div id="side-text" class="text-side-left">THE UNIVERSE ALIGNS</div>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/cannon@0.6.2/build/cannon.min.js"></script>
    
    <!-- Shaders: The Soul of Arcana -->
    <script id="bagua-fs" type="x-shader/x-fragment">
        uniform float time;
        uniform vec2 resolution;
        varying vec2 vUv;

        // Sacred Geometry / Bagua Pattern Logic
        void main() {
            vec2 p = vUv - 0.5;
            float r = length(p);
            float a = atan(p.y, p.x);
            
            // Yin-Yang Core
            float taiji = smoothstep(0.01, 0.0, abs(r - 0.1));
            
            // Rotating Bagua Rings
            float rings = 0.0;
            for(float i=1.0; i<=3.0; i++) {
                float ringR = 0.2 + i * 0.08;
                float segment = floor(a / (3.14159 / 4.0));
                float gap = mod(a, 3.14159 / 4.0);
                if(abs(r - ringR) < 0.005 && gap > 0.05) {
                    rings = 1.0;
                }
            }
            
            vec3 col = vec3(0.77, 0.63, 0.35) * (rings + taiji); // Gold
            gl_FragColor = vec4(col, col.r > 0.0 ? 1.0 : 0.0);
        }
    </script>

    <script>
        // --- ARCANA V3 ENGINE ---
        (function() {
            const canvas = document.getElementById('ritual-canvas');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            // Physics World
            const world = new CANNON.World();
            world.gravity.set(0, -9.82, 0);

            // 1. Immersive Environment (3D Altar)
            const altarGeo = new THREE.CylinderGeometry(5, 6, 2, 64);
            const altarMat = new THREE.MeshStandardMaterial({ 
                color: 0x050505, 
                roughness: 0.1, 
                metalness: 0.8,
                emissive: 0x111111 
            });
            const altar = new THREE.Mesh(altarGeo, altarMat);
            altar.position.y = -4;
            scene.add(altar);

            // 2. The Sacred Bag (Mesh Tearing PoC)
            // For V3, we use a SkinnedMesh or a Plane with Vertex Displacement
            const bagGeo = new THREE.PlaneGeometry(3, 4, 32, 32);
            const bagMat = new THREE.MeshStandardMaterial({ 
                color: 0x0a0a0a, 
                side: THREE.DoubleSide,
                emissive: 0x2d1b4e,
                emissiveIntensity: 0.2
            });
            const bag = new THREE.Mesh(bagGeo, bagMat);
            bag.position.z = 2;
            scene.add(bag);

            // Tearing logic state
            let isTearing = false;
            let tearProgress = 0;

            // 3. Lighting (Pointer Shadow Follow)
            const cursorLight = new THREE.PointLight(0xc5a059, 2, 15);
            scene.add(cursorLight);
            
            const ambient = new THREE.AmbientLight(0xffffff, 0.1);
            scene.add(ambient);

            // 4. Interaction (Hand Tear / Mouse Follow)
            const mouse = new THREE.Vector2();
            const cursor = document.getElementById('cursor');
            const cursorDot = document.getElementById('cursor-dot');

            window.addEventListener('mousemove', (e) => {
                mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
                mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
                
                // Cursor UI
                cursor.style.left = e.clientX + 'px';
                cursor.style.top = e.clientY + 'px';
                cursorDot.style.left = e.clientX + 'px';
                cursorDot.style.top = e.clientY + 'px';

                // Light Follow
                gsap.to(cursorLight.position, {
                    x: mouse.x * 5,
                    y: mouse.y * 5,
                    z: 5,
                    duration: 0.5
                });
            });

            // Hand Tear Ritual Trigger
            window.addEventListener('mousedown', () => {
                isTearing = true;
                gsap.to(cursor, { width: 40, height: 40, background: 'rgba(197, 160, 89, 0.2)', duration: 0.3 });
            });
            window.addEventListener('mouseup', () => {
                isTearing = false;
                gsap.to(cursor, { width: 20, height: 20, background: 'transparent', duration: 0.3 });
            });

            // 5. Narrative Control
            function triggerNarrative() {
                gsap.to('#subtitle', { opacity: 1, y: 0, duration: 2, ease: "power4.out" });
                gsap.to('#side-text', { opacity: 1, x: 0, duration: 2, delay: 0.5 });
            }

            // 6. Rendering Loop (Physics + GLSL + 3D)
            function animate(t) {
                requestAnimationFrame(animate);
                const time = t * 0.001;
                
                // Mesh Tearing Simulation (Vertex Displacement)
                if(isTearing && tearProgress < 1) {
                    const pos = bag.geometry.attributes.position;
                    for(let i=0; i<pos.count; i++) {
                        const x = pos.getX(i);
                        const y = pos.getY(i);
                        if(Math.abs(x) < 0.1) { // Center Tear Line
                            pos.setX(i, x + (x > 0 ? 0.05 : -0.05));
                        }
                    }
                    pos.needsUpdate = true;
                    tearProgress += 0.01;
                    if(tearProgress >= 1) {
                        // Reveal the Box or Card
                        revealRitual();
                    }
                }

                // Panoramic View (Subtle Camera Orbit)
                camera.position.x += (mouse.x * 2 - camera.position.x) * 0.05;
                camera.position.y += (mouse.y * 2 - camera.position.y) * 0.05;
                camera.lookAt(0, 0, 0);

                renderer.render(scene, camera);
            }

            function revealRitual() {
                gsap.to(bag.material, { opacity: 0, duration: 1, onComplete: () => bag.visible = false });
                document.getElementById('instruction').innerText = "Destiny Unfolded / 命理初现";
                triggerNarrative();
                // Spawn 3D Card with Bagua Shader here...
            }

            // 7. Initial Load
            window.onload = () => {
                setTimeout(() => {
                    gsap.to('#loader', { opacity: 0, duration: 2, onComplete: () => {
                        document.getElementById('loader').style.display = 'none';
                        camera.position.z = 12;
                        gsap.to(camera.position, { z: 8, duration: 3, ease: "expo.out" });
                        animate(0);
                    }});
                }, 2000);
            };

            window.addEventListener('resize', () => {
                camera.aspect = window.innerWidth / window.innerHeight;
                camera.updateProjectionMatrix();
                renderer.setSize(window.innerWidth, window.innerHeight);
            });
        })();
    </script>
</body>
</html>
